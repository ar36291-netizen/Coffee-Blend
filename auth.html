<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Daily Grind Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css">
<style>
  body { background: var(--bg-stone); min-height: 100vh; display: flex; flex-direction: column; }
  .auth-header {
    padding: 2rem 5vw;
    display: flex; justify-content: space-between; align-items: center;
  }
  .auth-logo {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.12em;
    color: var(--ink);
    text-decoration: none;
  }
  .auth-wrap {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 4rem 5vw;
  }
  .auth-card {
    width: 100%;
    max-width: 420px;
  }
  .auth-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent-copper);
    font-weight: 700;
    margin-bottom: 1.25rem;
  }
  .auth-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 2.8rem;
    line-height: 1.05;
    color: var(--ink);
    margin-bottom: 2.5rem;
  }
  .tab-row {
    display: flex;
    border-bottom: 1px solid var(--line);
    margin-bottom: 2rem;
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 0.75rem 0;
    font-family: var(--font-body);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }
  .form-group {
    margin-bottom: 1.25rem;
  }
  .form-label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 0.5rem;
  }
  .form-input {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(28,26,23,0.25);
    padding: 0.875rem 1rem;
    font-family: var(--font-body);
    font-size: 0.85rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--ink); }
  .form-input::placeholder { color: var(--ink-soft); opacity: 0.5; }
  .submit-btn {
    width: 100%;
    margin-top: 0.75rem;
    padding: 1rem;
    background: var(--ink);
    color: var(--bg-stone);
    border: none;
    font-family: var(--font-body);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.8; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .auth-message {
    margin-top: 1rem;
    font-size: 0.8rem;
    line-height: 1.5;
    min-height: 1.5rem;
    color: var(--accent-copper);
    text-align: center;
  }
  .auth-message.success { color: #2d7a3c; }
  .divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 2rem 0;
  }
  .auth-footer {
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
  }
  .auth-footer a { color: var(--ink); border-bottom: 1px solid currentColor; }
  .welcome-back {
    display: none;
    text-align: center;
    padding: 2rem 0;
  }
  .welcome-back-email {
    font-family: var(--font-body);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin-bottom: 0.5rem;
  }
  .welcome-back-name {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 2rem;
    word-break: break-all;
  }
  .welcome-back .submit-btn { margin-bottom: 0.75rem; }
  .btn-switch {
    width: 100%; background: none; border: 1px solid var(--line);
    padding: 0.875rem; font-family: var(--font-body);
    font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-soft); cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-switch:hover { border-color: var(--ink); color: var(--ink); }
  .google-btn {
    width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 0.75rem;
    background: #fff;
    border: 1px solid rgba(28,26,23,0.22);
    padding: 0.875rem 1rem;
    font-family: var(--font-body);
    font-size: 0.75rem; letter-spacing: 0.08em;
    color: var(--ink); cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .google-btn:hover { border-color: var(--ink); box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
</style>
</head>
<body>

<header class="auth-header">
  <a href="index.html" class="auth-logo">Daily Grind Co.</a>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-eyebrow">Your account</div>
    <h1 class="auth-title">Sign in to<br>build your blend.</h1>

    <div class="tab-row">
      <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- SIGN IN FORM -->
    <form id="form-signin" onsubmit="handleSignIn(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="signin-email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="signin-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="submit-btn" id="btn-signin">Sign In →</button>
    </form>

    <!-- SIGN UP FORM -->
    <form id="form-signup" onsubmit="handleSignUp(event)" style="display:none">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="signup-email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="signup-password" placeholder="Min. 6 characters" required minlength="6">
      </div>
      <button type="submit" class="submit-btn" id="btn-signup">Create Account →</button>
    </form>

    <div class="auth-message" id="auth-msg"></div>

    <hr class="divider">

    <!-- GOOGLE LOGIN -->
    <button class="google-btn" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <hr class="divider">
    <p class="auth-footer">
      By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
    </p>

    <!-- WELCOME BACK STATE -->
    <div class="welcome-back" id="welcome-back">
      <div class="auth-eyebrow">Welcome back</div>
      <div class="welcome-back-name" id="welcome-email"></div>
      <button class="submit-btn" onclick="window.location.href='builder.html'">Continue to Builder →</button>
      <button class="btn-switch" onclick="switchAccount()">Sign in with a different account</button>
    </div>
  </div>
</div>

<script src="js/supabase-config.js"></script>
<script>
function switchTab(tab) {
  const isSignin = tab === 'signin';
  document.getElementById('tab-signin').classList.toggle('active', isSignin);
  document.getElementById('tab-signup').classList.toggle('active', !isSignin);
  document.getElementById('form-signin').style.display = isSignin ? '' : 'none';
  document.getElementById('form-signup').style.display = isSignin ? 'none' : '';
  document.getElementById('auth-msg').textContent = '';
}

function setMsg(text, success = false) {
  const el = document.getElementById('auth-msg');
  el.textContent = text;
  el.className = 'auth-message' + (success ? ' success' : '');
}

function showWelcomeBack(email) {
  document.getElementById('form-signin').style.display = 'none';
  document.getElementById('form-signup').style.display = 'none';
  document.querySelector('.tab-row').style.display = 'none';
  document.querySelectorAll('.divider').forEach(el => el.style.display = 'none');
  document.querySelector('.google-btn').style.display = 'none';
  document.querySelector('.auth-footer').style.display = 'none';
  document.querySelector('.auth-title').textContent = 'You\'re signed in.';
  document.getElementById('welcome-email').textContent = email;
  document.getElementById('welcome-back').style.display = 'block';
}

async function switchAccount() {
  await window.supabase.auth.signOut();
  window.location.reload();
}

async function handleSignIn(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-signin');
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  const { error } = await window.supabase.auth.signInWithPassword({
    email: document.getElementById('signin-email').value,
    password: document.getElementById('signin-password').value,
  });
  if (error) { setMsg(error.message); btn.disabled = false; btn.textContent = 'Sign In →'; }
  else { setMsg('Signed in! Redirecting…', true); setTimeout(() => window.location.href = 'builder.html', 800); }
}

async function handleSignUp(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-signup');
  btn.disabled = true;
  btn.textContent = 'Creating account…';
  const { error } = await window.supabase.auth.signUp({
    email: document.getElementById('signup-email').value,
    password: document.getElementById('signup-password').value,
  });
  if (error) { setMsg(error.message); btn.disabled = false; btn.textContent = 'Create Account →'; }
  else { setMsg('Account created! Check your email to confirm, then sign in.', true); btn.disabled = false; btn.textContent = 'Create Account →'; }
}

async function handleGoogleLogin() {
  const { error } = await window.supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/builder.html' }
  });
  if (error) setMsg(error.message);
}

// Show welcome-back state if already logged in (don't auto-redirect)
window.supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) showWelcomeBack(session.user.email);
});
</script>
</body>
</html>
